# =============================================================================
# Healthcare Data Dictionary - NCD (Non-Communicable Disease) Analytics
# =============================================================================
# This data dictionary is specifically designed for healthcare analytics
# focused on hypertension, diabetes, and cardiovascular disease management.
#
# DOMAIN: Healthcare / Public Health / NCD Programs
# USE CASE: Blood pressure monitoring, CVD risk assessment, patient tracking
# =============================================================================

business_definitions:
  # =========================================================================
  # Blood Pressure Classifications (WHO/ISH Guidelines)
  # =========================================================================
  hypertensive patient:
    table: wdf_bp_assessment_data
    condition: "avg_systolic >= 140 OR avg_diastolic >= 90"
    description: "Patient with blood pressure readings indicating hypertension (systolic ≥140 or diastolic ≥90 mmHg)"

  controlled hypertension:
    table: wdf_bp_assessment_data
    condition: "avg_systolic < 140 AND avg_diastolic < 90"
    description: "Hypertensive patient whose BP is now controlled (systolic <140 AND diastolic <90 mmHg)"

  uncontrolled hypertension:
    table: wdf_bp_assessment_data
    condition: "avg_systolic >= 140 OR avg_diastolic >= 90"
    description: "Patient with uncontrolled blood pressure despite treatment"

  stage 1 hypertension:
    table: wdf_bp_assessment_data
    condition: "(avg_systolic >= 140 AND avg_systolic < 160) OR (avg_diastolic >= 90 AND avg_diastolic < 100)"
    description: "Mild hypertension (systolic 140-159 or diastolic 90-99 mmHg)"

  stage 2 hypertension:
    table: wdf_bp_assessment_data
    condition: "avg_systolic >= 160 OR avg_diastolic >= 100"
    description: "Moderate to severe hypertension (systolic ≥160 or diastolic ≥100 mmHg)"

  stage 3 hypertension:
    table: wdf_bp_assessment_data
    condition: "avg_systolic >= 180 OR avg_diastolic >= 110"
    description: "Severe/crisis hypertension requiring immediate attention (systolic ≥180 or diastolic ≥110 mmHg)"

  normal blood pressure:
    table: wdf_bp_assessment_data
    condition: "avg_systolic < 120 AND avg_diastolic < 80"
    description: "Normal blood pressure (systolic <120 AND diastolic <80 mmHg)"

  elevated blood pressure:
    table: wdf_bp_assessment_data
    condition: "avg_systolic >= 120 AND avg_systolic < 130 AND avg_diastolic < 80"
    description: "Elevated BP, pre-hypertension stage (systolic 120-129 AND diastolic <80 mmHg)"

  isolated systolic hypertension:
    table: wdf_bp_assessment_data
    condition: "avg_systolic >= 140 AND avg_diastolic < 90"
    description: "High systolic with normal diastolic, common in elderly patients"

  # =========================================================================
  # CVD Risk Stratification
  # =========================================================================
  high cvd risk:
    table: wdf_bp_assessment_data
    condition: "cvd_risk_level = 'High risk'"
    description: "Patient with high cardiovascular disease risk (>20% 10-year risk)"

  moderate cvd risk:
    table: wdf_bp_assessment_data
    condition: "cvd_risk_level = 'Medium risk'"
    description: "Patient with moderate cardiovascular disease risk (10-20% 10-year risk)"

  low cvd risk:
    table: wdf_bp_assessment_data
    condition: "cvd_risk_level = 'Low risk'"
    description: "Patient with low cardiovascular disease risk (<10% 10-year risk)"

  high risk patient:
    table: wdf_bp_assessment_data
    condition: "cvd_risk_level = 'High risk' OR cvd_risk_score >= 20"
    description: "Patient requiring intensive intervention due to high CVD risk"

  # =========================================================================
  # BMI Classifications (WHO Standards)
  # =========================================================================
  obese patient:
    table: wdf_bp_assessment_data
    condition: "bmi_category IN ('Obese', 'Extremely Obese') OR bmi >= 30"
    description: "Patient with BMI ≥30 kg/m² (obese classification)"

  morbidly obese:
    table: wdf_bp_assessment_data
    condition: "bmi_category = 'Extremely Obese' OR bmi >= 40"
    description: "Patient with BMI ≥40 kg/m² (morbidly/extremely obese)"

  overweight patient:
    table: wdf_bp_assessment_data
    condition: "bmi_category = 'Overweight' OR (bmi >= 25 AND bmi < 30)"
    description: "Patient with BMI 25-29.9 kg/m² (overweight)"

  normal weight:
    table: wdf_bp_assessment_data
    condition: "bmi_category = 'Normal' OR (bmi >= 18.5 AND bmi < 25)"
    description: "Patient with healthy BMI 18.5-24.9 kg/m²"

  underweight patient:
    table: wdf_bp_assessment_data
    condition: "bmi_category = 'Underweight' OR bmi < 18.5"
    description: "Patient with BMI <18.5 kg/m² (underweight)"

  # =========================================================================
  # Patient Tracking & Program Status
  # =========================================================================
  active patient:
    table: patient_tracker
    condition: "is_active = true AND is_deleted = false"
    description: "Patient currently enrolled and active in the NCD program"

  enrolled patient:
    table: patient_tracker
    condition: "is_enrolled = true AND is_active = true AND is_deleted = false"
    description: "Patient successfully enrolled in the hypertension management program"

  screened patient:
    table: patient_tracker
    condition: "is_screening = true"
    description: "Patient who has completed initial BP screening"

  diagnosed patient:
    table: patient_tracker
    condition: "is_confirmed_diagnosis = true"
    description: "Patient with confirmed hypertension diagnosis"

  lost to follow up:
    table: patient_tracker
    condition: "is_active = false AND is_deleted = false AND last_visit_date < CURRENT_DATE - INTERVAL '90 days'"
    description: "Patient who hasn't visited in over 90 days"

  new patient:
    table: patient_tracker
    condition: "created_at >= CURRENT_DATE - INTERVAL '30 days'"
    description: "Patient registered in the last 30 days"

  # =========================================================================
  # Assessment & Visit Types
  # =========================================================================
  latest assessment:
    table: wdf_bp_assessment_data
    condition: "is_latest = 'true'"
    description: "Most recent BP assessment for each patient"

  pre-diagnosis reading:
    table: wdf_bp_assessment_data
    condition: "is_before_htn_diagnosis = 'true'"
    description: "BP reading taken before hypertension was officially diagnosed"

  facility visit:
    table: wdf_bp_assessment_data
    condition: "encounter_type = 'Facility-based'"
    description: "Assessment conducted at a health facility/clinic"

  community outreach:
    table: wdf_bp_assessment_data
    condition: "encounter_type = 'Community Outreach'"
    description: "Assessment conducted during community health outreach"

  screening visit:
    table: wdf_bp_assessment_data
    condition: "assessment_category = 'Screening'"
    description: "Initial screening assessment for new patients"

  follow up visit:
    table: wdf_bp_assessment_data
    condition: "assessment_category = 'Follow-up'"
    description: "Follow-up visit for existing patients"

  # =========================================================================
  # Time-Based Filters
  # =========================================================================
  this month:
    table: wdf_bp_assessment_data
    condition: "ymd >= DATE_TRUNC('month', CURRENT_DATE)"
    description: "Assessments from the current calendar month"

  last month:
    table: wdf_bp_assessment_data
    condition: "ymd >= DATE_TRUNC('month', CURRENT_DATE - INTERVAL '1 month') AND ymd < DATE_TRUNC('month', CURRENT_DATE)"
    description: "Assessments from the previous calendar month"

  last 30 days:
    table: wdf_bp_assessment_data
    condition: "ymd >= CURRENT_DATE - INTERVAL '30 days'"
    description: "Assessments from the last 30 days"

  last 90 days:
    table: wdf_bp_assessment_data
    condition: "ymd >= CURRENT_DATE - INTERVAL '90 days'"
    description: "Assessments from the last 90 days (quarterly)"

  this year:
    table: wdf_bp_assessment_data
    condition: "ymd >= DATE_TRUNC('year', CURRENT_DATE)"
    description: "Assessments from the current calendar year"

