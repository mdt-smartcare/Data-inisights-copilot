# =============================================================================
# Default Filters - Always Applied Unless Explicitly Overridden
# =============================================================================
default_filters:
  patient_tracker:
    - "is_deleted = false"
    - "is_active = true"

  wdf_bp_assessment_data:
    - "is_latest = 'true'"  # Default to latest readings only

# =============================================================================
# Healthcare Metric Templates
# =============================================================================
metric_templates:
  # Blood Pressure Metrics
  hypertension_rate:
    expression: "COUNT(DISTINCT CASE WHEN avg_systolic >= 140 OR avg_diastolic >= 90 THEN patient_id END) * 100.0 / NULLIF(COUNT(DISTINCT patient_id), 0)"
    description: "Percentage of patients with hypertensive BP readings"
    tables: ["wdf_bp_assessment_data"]

  bp_control_rate:
    expression: "COUNT(DISTINCT CASE WHEN avg_systolic < 140 AND avg_diastolic < 90 THEN patient_id END) * 100.0 / NULLIF(COUNT(DISTINCT patient_id), 0)"
    description: "Percentage of patients with controlled blood pressure"
    tables: ["wdf_bp_assessment_data"]

  stage2_hypertension_rate:
    expression: "COUNT(DISTINCT CASE WHEN avg_systolic >= 160 OR avg_diastolic >= 100 THEN patient_id END) * 100.0 / NULLIF(COUNT(DISTINCT patient_id), 0)"
    description: "Percentage of patients with Stage 2 or higher hypertension"
    tables: ["wdf_bp_assessment_data"]

  # CVD Risk Metrics
  high_risk_rate:
    expression: "COUNT(DISTINCT CASE WHEN cvd_risk_level = 'High risk' THEN patient_id END) * 100.0 / NULLIF(COUNT(DISTINCT patient_id), 0)"
    description: "Percentage of patients classified as high CVD risk"
    tables: ["wdf_bp_assessment_data"]

  average_cvd_risk:
    expression: "AVG(cvd_risk_score)"
    description: "Average CVD risk score across patients"
    tables: ["wdf_bp_assessment_data"]

  # BMI/Obesity Metrics
  obesity_rate:
    expression: "COUNT(DISTINCT CASE WHEN bmi_category IN ('Obese', 'Extremely Obese') THEN patient_id END) * 100.0 / NULLIF(COUNT(DISTINCT patient_id), 0)"
    description: "Percentage of patients classified as obese"
    tables: ["wdf_bp_assessment_data"]

  average_bmi:
    expression: "AVG(bmi)"
    description: "Average BMI across patients"
    tables: ["wdf_bp_assessment_data"]

  # Program Metrics
  screening_rate:
    expression: "COUNT(DISTINCT CASE WHEN is_screening = true THEN id END) * 100.0 / NULLIF(COUNT(DISTINCT id), 0)"
    description: "Percentage of patients who completed screening"
    tables: ["patient_tracker"]

  enrollment_rate:
    expression: "COUNT(DISTINCT CASE WHEN is_enrolled = true THEN id END) * 100.0 / NULLIF(COUNT(DISTINCT CASE WHEN is_screening = true THEN id END), 0)"
    description: "Percentage of screened patients who enrolled"
    tables: ["patient_tracker"]

  diagnosis_rate:
    expression: "COUNT(DISTINCT CASE WHEN is_confirmed_diagnosis = true THEN id END) * 100.0 / NULLIF(COUNT(DISTINCT CASE WHEN is_enrolled = true THEN id END), 0)"
    description: "Percentage of enrolled patients with confirmed diagnosis"
    tables: ["patient_tracker"]

# =============================================================================
# Table Descriptions - Healthcare Context
# =============================================================================
table_descriptions:
  wdf_bp_assessment_data: "Blood pressure assessment records containing patient BP readings (3 measurements averaged), BMI, CVD risk levels, and clinical encounter information. Primary table for hypertension analytics."
  
  patient_tracker: "Patient registry tracking enrollment status, screening completion, diagnosis confirmation, and program participation in the NCD/hypertension management program."
  
  patient_visit: "Clinical visit records documenting patient encounters at health facilities."
  
  patient_diagnosis: "Confirmed medical diagnoses for patients including ICD codes and diagnosis dates."
  
  patient_lab_test: "Laboratory test orders and requests for patients."
  
  patient_lab_test_result: "Laboratory test results including values and reference ranges."
  
  patient_treatment_plan: "Treatment plans and medication regimens assigned to patients."
  
  site: "Health facilities and clinics where patient services are delivered."
  
  organization: "Healthcare organizations and implementing partners managing facilities."

# =============================================================================
# Column Semantics - Healthcare Data Dictionary
# =============================================================================
column_semantics:
  wdf_bp_assessment_data:
    res_id: "Unique identifier for this BP assessment record"
    encounter_id: "Links to the clinical encounter/visit"
    ymd: "Date of BP assessment (YYYY-MM-DD)"
    patient_id: "Unique patient identifier"
    avg_systolic: "Average of 3 systolic BP readings (mmHg) - key metric for hypertension"
    avg_diastolic: "Average of 3 diastolic BP readings (mmHg) - key metric for hypertension"
    avg_pulse: "Average heart rate (beats per minute)"
    systolic_1: "First systolic reading"
    systolic_2: "Second systolic reading"
    systolic_3: "Third systolic reading"
    diastolic_1: "First diastolic reading"
    diastolic_2: "Second diastolic reading"
    diastolic_3: "Third diastolic reading"
    bmi: "Body Mass Index calculated from height and weight"
    bmi_category: "WHO BMI classification (Underweight/Normal/Overweight/Obese/Extremely Obese)"
    cvd_risk_level: "Cardiovascular disease risk category (Low/Medium/High risk)"
    cvd_risk_score: "Numerical 10-year CVD risk percentage (0-100)"
    is_latest: "Boolean flag - TRUE means this is the patient's most recent assessment"
    is_before_htn_diagnosis: "Boolean flag - TRUE means reading was before hypertension diagnosis"
    encounter_type: "Service delivery point (Facility-based/Community Outreach)"
    assessment_category: "Purpose of visit (Screening/Follow-up/Referral)"
    facility_id: "Health facility unique identifier"
    facility_name: "Name of the health facility"
    county: "County/province geographic location"
    subcounty: "Sub-county/district geographic location"
    program_name: "NCD program name"

  patient_tracker:
    id: "Unique patient identifier"
    is_active: "Whether patient is currently active in program"
    is_deleted: "Soft-delete flag - exclude from queries"
    is_screening: "Whether patient completed initial screening"
    is_enrolled: "Whether patient is enrolled in NCD program"
    is_confirmed_diagnosis: "Whether patient has confirmed hypertension diagnosis"
    gender: "Patient gender (Male/Female)"
    age: "Patient age in years"
    cvd_risk_level: "Most recent CVD risk classification"
    created_at: "Date patient was registered"
    last_visit_date: "Date of most recent clinical visit"

# =============================================================================
# Validation Rules - Healthcare Data Governance
# =============================================================================
validation_rules:
  required_filters:
    - "Queries on patient_tracker must include is_deleted = false"
    - "Patient-level queries should filter to is_active = true unless analyzing dropouts"
    - "Use is_latest = 'true' for current patient status, remove for trend analysis"
  
  clinical_thresholds:
    - "Hypertension: systolic >= 140 OR diastolic >= 90"
    - "Stage 2 HTN: systolic >= 160 OR diastolic >= 100"
    - "Controlled BP: systolic < 140 AND diastolic < 90"
    - "Obesity: BMI >= 30"
    - "High CVD Risk: cvd_risk_level = 'High risk' OR cvd_risk_score >= 20"

  prohibited_operations:
    - "No DELETE, UPDATE, INSERT operations - read-only analytics"
    - "No access to PII beyond patient_id for analytics"
    - "No TRUNCATE, DROP, ALTER operations"

# =============================================================================
# Healthcare-Specific Query Patterns
# =============================================================================
query_patterns:
  bp_trend_over_time:
    description: "Track blood pressure trends over time periods"
    pattern: "SELECT DATE_TRUNC('month', ymd) as month, AVG(avg_systolic) as avg_systolic, AVG(avg_diastolic) as avg_diastolic FROM wdf_bp_assessment_data GROUP BY 1 ORDER BY 1"

  hypertension_by_facility:
    description: "Compare hypertension rates across facilities"
    pattern: "SELECT facility_name, COUNT(DISTINCT CASE WHEN avg_systolic >= 140 OR avg_diastolic >= 90 THEN patient_id END) * 100.0 / COUNT(DISTINCT patient_id) as htn_rate FROM wdf_bp_assessment_data GROUP BY facility_name"

  patient_risk_distribution:
    description: "Distribution of patients by CVD risk level"
    pattern: "SELECT cvd_risk_level, COUNT(DISTINCT patient_id) as patient_count FROM wdf_bp_assessment_data WHERE is_latest = 'true' GROUP BY cvd_risk_level"

  bmi_category_breakdown:
    description: "Patient distribution by BMI category"
    pattern: "SELECT bmi_category, COUNT(DISTINCT patient_id) as count FROM wdf_bp_assessment_data WHERE is_latest = 'true' GROUP BY bmi_category"
