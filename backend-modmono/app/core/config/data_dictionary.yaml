# =============================================================================
# Data Dictionary Configuration
# =============================================================================
# This file maps business terms, synonyms, and default filters to database
# schema elements. It is loaded by the DataDictionary service and injected
# into SQL generation prompts for schema-aware, semantically grounded queries.
#
# PRIVACY NOTE: This file uses GENERIC patterns only. No real column names,
# data values, or identifying information should be included here.
#
# INSTRUCTIONS:
# - Add your domain-specific definitions below
# - Restart the backend or call DataDictionary.reload() to pick up changes
# - Use lowercase keys for case-insensitive matching
# =============================================================================

# -----------------------------------------------------------------------------
# Business Definitions
# Maps business terms to their schema-level meaning (table + condition)
# Used to resolve ambiguous user questions to precise SQL conditions
# -----------------------------------------------------------------------------
business_definitions:
  # ===== Record Status Definitions =====
  active_record:
    table: entity_table
    condition: "is_active = true AND is_deleted = false"
    description: "Records that are currently active and not soft-deleted"

  deleted_record:
    table: entity_table
    condition: "is_deleted = true"
    description: "Records that have been soft-deleted from the system"

  inactive_record:
    table: entity_table
    condition: "is_active = false AND is_deleted = false"
    description: "Records that are inactive but not deleted"

  valid_record:
    table: entity_table
    condition: "is_active = true AND is_deleted = false AND is_valid = true"
    description: "Records that are active, not deleted, and have passed validation"

  # ===== Time-Based Definitions =====
  recent_record:
    table: entity_table
    condition: "created_at >= CURRENT_DATE - INTERVAL '30 days'"
    description: "Records created in the last 30 days"

  historical_record:
    table: entity_table
    condition: "created_at < CURRENT_DATE - INTERVAL '365 days'"
    description: "Records older than one year"

  current_period:
    table: measurement_table
    condition: "measurement_date >= DATE_TRUNC('month', CURRENT_DATE)"
    description: "Records from the current calendar month"

  previous_period:
    table: measurement_table
    condition: "measurement_date >= DATE_TRUNC('month', CURRENT_DATE - INTERVAL '1 month') AND measurement_date < DATE_TRUNC('month', CURRENT_DATE)"
    description: "Records from the previous calendar month"

  last_7_days:
    table: entity_table
    condition: "created_at >= CURRENT_DATE - INTERVAL '7 days'"
    description: "Records from the last 7 days"

  last_90_days:
    table: entity_table
    condition: "created_at >= CURRENT_DATE - INTERVAL '90 days'"
    description: "Records from the last 90 days"

  year_to_date:
    table: entity_table
    condition: "created_at >= DATE_TRUNC('year', CURRENT_DATE)"
    description: "Records from the start of the current year"

  # ===== Measurement Threshold Definitions =====
  normal_range:
    table: measurement_table
    condition: "value >= lower_threshold AND value <= upper_threshold"
    description: "Measurements within normal/expected range"

  elevated_value:
    table: measurement_table
    condition: "value > upper_threshold"
    description: "Measurements above the upper threshold"

  low_value:
    table: measurement_table
    condition: "value < lower_threshold"
    description: "Measurements below the lower threshold"

  critical_value:
    table: measurement_table
    condition: "value > critical_upper OR value < critical_lower"
    description: "Measurements in critical range requiring attention"

  within_target:
    table: measurement_table
    condition: "value >= target_min AND value <= target_max"
    description: "Measurements within target goal range"

  # ===== Status Category Definitions =====
  pending_status:
    table: entity_table
    condition: "status IN ('pending', 'awaiting', 'queued', 'submitted')"
    description: "Records in a pending or waiting state"

  completed_status:
    table: entity_table
    condition: "status IN ('completed', 'done', 'finished', 'closed')"
    description: "Records that have been completed"

  in_progress_status:
    table: entity_table
    condition: "status IN ('in_progress', 'active', 'ongoing', 'processing')"
    description: "Records currently being processed"

  cancelled_status:
    table: entity_table
    condition: "status IN ('cancelled', 'canceled', 'voided', 'aborted')"
    description: "Records that were cancelled"

  # ===== Risk Level Definitions =====
  high_risk:
    table: entity_table
    condition: "risk_level IN ('high', 'critical', 'severe', 'urgent')"
    description: "Records classified as high risk"

  moderate_risk:
    table: entity_table
    condition: "risk_level IN ('moderate', 'medium', 'elevated')"
    description: "Records classified as moderate risk"

  low_risk:
    table: entity_table
    condition: "risk_level IN ('low', 'minimal', 'normal')"
    description: "Records classified as low risk"

  # ===== Data Quality Definitions =====
  complete_record:
    table: entity_table
    condition: "is_complete = true AND missing_fields = 0"
    description: "Records with all required fields populated"

  incomplete_record:
    table: entity_table
    condition: "is_complete = false OR missing_fields > 0"
    description: "Records with missing required fields"

  verified_record:
    table: entity_table
    condition: "is_verified = true AND verified_at IS NOT NULL"
    description: "Records that have been verified"

  duplicate_suspected:
    table: entity_table
    condition: "is_potential_duplicate = true"
    description: "Records flagged as potential duplicates"


