version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: data_insights_backend
    environment:
      # Internal SQLite database path (for app config, users, settings)
      SQLITE_DB_PATH: ./sqliteDb/copilot.db
      
      # Server Configuration
      HOST: 0.0.0.0
      PORT: 8000
      API_V1_PREFIX: /api/v1
      DEBUG: "false"
      
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
      
      # Security (CHANGE THESE IN PRODUCTION!)
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production-min-32-chars}
      
      # OpenAI API Key (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # File paths
      LOG_FILE: ./logs/backend.log
      MODELS_PATH: ./models
      DATA_PATH: ./data
      
      # Optional: OIDC/Keycloak (leave empty to use local auth)
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-data-insights-copilot}
      
      # Optional: Langfuse tracing
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      ENABLE_LANGFUSE: ${ENABLE_LANGFUSE:-false}
    volumes:
      - ./backend:/app/backend
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
      - ./backend/sqliteDb:/app/backend/sqliteDb
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - copilot_network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: data_insights_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - copilot_network
    restart: unless-stopped

networks:
  copilot_network:
    driver: bridge

# =============================================================================
# NOTE: Clinical database connections are NOT configured here.
# They are managed via the frontend Settings > Database Connections page
# and stored in the `db_connections` table.
#
# To connect to a clinical database:
# 1. Start the application
# 2. Go to Settings > Database Connections
# 3. Add your PostgreSQL/MySQL connection details
# 4. Create a RAG Configuration that uses the connection
# 5. Publish the configuration
# =============================================================================
