version: '3.8'

services:
  # PostgreSQL Database (for internal app config, users, settings)
  postgres:
    image: postgres:16-alpine
    container_name: data_insights_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-copilot}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_copilot_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - copilot_network
    restart: unless-stopped

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: data_insights_backend
    environment:
      # PostgreSQL Database (for app config, users, settings)
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-copilot}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      
      # Server Configuration
      HOST: 0.0.0.0
      PORT: 8000
      API_V1_PREFIX: /api/v1
      DEBUG: "false"
      
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
      
      # Security (CHANGE THESE IN PRODUCTION!)
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production-min-32-chars}
      
      # OpenAI API Key (required)
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # File paths
      LOG_FILE: ./logs/backend.log
      MODELS_PATH: ./models
      DATA_PATH: ./data
      
      # Optional: OIDC/Keycloak (leave empty to use local auth)
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-data-insights-copilot}
      
      # Optional: Langfuse tracing
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      ENABLE_LANGFUSE: ${ENABLE_LANGFUSE:-false}
      
      # Celery Configuration
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - copilot_network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: data_insights_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - copilot_network
    restart: unless-stopped

  # RabbitMQ Message Broker (for Celery tasks)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: data_insights_rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - copilot_network
    restart: unless-stopped

  # Redis for Celery Results Backend (and caching)
  redis:
    image: redis:7-alpine
    container_name: data_insights_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - copilot_network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: data_insights_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - copilot_network
    restart: unless-stopped

  # Celery Worker for Embedding
  embedding_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: data_insights_embedding_worker
    command: celery -A backend.pipeline.workers.embedding_worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      # PostgreSQL Database (for app config, users, settings)
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-copilot}
      POSTGRES_USER: ${POSTGRES_USER:-copilot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copilot_password}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MODELS_PATH: ./models
    volumes:
      - ./backend:/app/backend
      - ./backend/models:/app/backend/models
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - copilot_network
    restart: unless-stopped

  # Flower - Celery Monitoring UI
  flower:
    image: mher/flower:2.0
    container_name: data_insights_flower
    command: celery --broker=amqp://guest:guest@rabbitmq:5672// flower --port=5555 --broker_api=http://guest:guest@rabbitmq:15672/api/
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - copilot_network
    restart: unless-stopped

volumes:
  postgres_copilot_data:
  rabbitmq_data:
  redis_data:
  qdrant_data:

networks:
  copilot_network:
    driver: bridge

# =============================================================================
# ARCHITECTURE:
#   Celery + RabbitMQ (message broker) + Redis (results backend)
#
# SERVICES & PORTS:
#   - Backend API:      http://localhost:8000
#   - Frontend:         http://localhost:3000
#   - RabbitMQ AMQP:    localhost:5672
#   - RabbitMQ UI:      http://localhost:15672 (guest/guest)
#   - Redis:            localhost:6379
#   - Qdrant:           http://localhost:6333
#   - Flower (Celery):  http://localhost:5555
#
# NOTE: Clinical database connections are NOT configured here.
# They are managed via the frontend Settings > Database Connections page
# and stored in the `db_connections` table.
# =============================================================================
